name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --exclude=.git,__pycache__

      - name: Test
        run: |
          pip install -r requirements.txt
          python -m pytest --tb=short || true

